# ==========================================
# SERVER CONFIGURATION
# ==========================================
server.port=${PORT:8080}


# ==========================================
# MONGODB CONFIGURATION
# ==========================================
# Local default:
# mongodb://localhost:27017/SecureVideoDB
#
# Render:
# Uses SPRING_DATA_MONGODB_URI environment variable
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/SecureVideoDB}


# ==========================================
# FILE STORAGE CONFIGURATION
# ==========================================
securevideo.storage.path=./storage
securevideo.storage.chunks=./storage/chunks
securevideo.storage.videos=./storage/videos


# ==========================================
# JWT CONFIGURATION
# ==========================================
# Render:
# Uses SECUREVIDEO_JWT_SECRET environment variable
securevideo.jwt.secret=${SECUREVIDEO_JWT_SECRET:local-dev-secret-key-change-this-123456789}
securevideo.jwt.expiration=86400000


# ==========================================
# SHARE LINK CONFIGURATION
# ==========================================
securevideo.share.expiration-hours=24

# Local default:
# http://localhost:5173/share
#
# Render:
# https://secure-vedio-project.vercel.app/share
securevideo.share.base-url=${SECUREVIDEO_SHARE_BASE_URL:http://localhost:5173/share}


# ==========================================
# FILE UPLOAD LIMITS
# ==========================================
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB


# ==========================================
# GMAIL SMTP CONFIGURATION
# ==========================================
# Local and Render:
# Set GMAIL_USERNAME to the Gmail address.
# Set GMAIL_APP_PASSWORD to the 16-character Google App Password.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=venkateshponnam555@gmail.com
spring.mail.password=npnksgfxeyfekuuc

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Mail connection timeouts
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Validate SMTP connection only when an email is sent
spring.mail.test-connection=false

# Encoding
spring.mail.default-encoding=UTF-8