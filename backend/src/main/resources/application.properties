# ==========================================
# SERVER CONFIGURATION
# ==========================================
server.port=${PORT:8080}

# ==========================================
# MONGODB CONFIGURATION
# ==========================================
# Local:
#   mongodb://localhost:27017/SecureVideoDB
# Render:
#   Uses SPRING_DATA_MONGODB_URI environment variable
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/SecureVideoDB}

# ==========================================
# FILE STORAGE CONFIGURATION
# ==========================================
securevideo.storage.path=./storage
securevideo.storage.chunks=./storage/chunks
securevideo.storage.videos=./storage/videos

# ==========================================
# JWT CONFIGURATION
# ==========================================
# Local:
#   Uses default value below
# Render:
#   Uses SECUREVIDEO_JWT_SECRET environment variable
securevideo.jwt.secret=${SECUREVIDEO_JWT_SECRET:local-dev-secret-key-change-this-123456789}
securevideo.jwt.expiration=86400000

# ==========================================
# SHARE LINK CONFIGURATION
# ==========================================
securevideo.share.expiration-hours=24

# Local:
#   http://localhost:5173/share
# Render:
#   https://secure-vedio-project.vercel.app/share
securevideo.share.base-url=${SECUREVIDEO_SHARE_BASE_URL:http://localhost:5173/share}

# ==========================================
# FILE UPLOAD LIMITS
# ==========================================
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB

# ==========================================
# RESEND CONFIGURATION
# ==========================================
# Local:
#   Dummy value
# Render:
#   Uses RESEND_API_KEY environment variable
resend.api.key=${RESEND_API_KEY:local-dev-placeholder}