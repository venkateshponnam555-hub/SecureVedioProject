# ==========================================
# SERVER CONFIGURATION
# ==========================================
server.port=${PORT:8080}


# ==========================================
# MONGODB CONFIGURATION
# ==========================================
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}


# ==========================================
# FILE STORAGE CONFIGURATION
# ==========================================
securevideo.storage.path=./storage
securevideo.storage.chunks=./storage/chunks
securevideo.storage.videos=./storage/videos


# ==========================================
# JWT CONFIGURATION
# ==========================================
securevideo.jwt.secret=${SECUREVIDEO_JWT_SECRET}
securevideo.jwt.expiration=86400000


# ==========================================
# SHARE LINK CONFIGURATION
# ==========================================
securevideo.share.expiration-hours=24

# Local Development
# securevideo.share.base-url=http://localhost:5173/share

# Production (Render)
securevideo.share.base-url=https://securevedioproject.onrender.com/share


# ==========================================
# FILE UPLOAD LIMITS
# ==========================================
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB


# ==========================================
# GMAIL SMTP CONFIGURATION
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000